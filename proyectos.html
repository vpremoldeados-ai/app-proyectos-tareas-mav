<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyectos Kanban — VPH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --surface-2: #f3f4f6; --border: #e5e7eb;
            --accent: #6366f1; --accent-2: #8b5cf6; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --text: #1f2937; --text-2: #6b7280; --text-3: #9ca3af; --radius: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 16px; }
        .container { max-width: 1600px; margin: 0 auto; }
        header { display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding: 18px 24px; background: var(--surface);
            border-radius: var(--radius); border: 2px solid var(--accent); }
        header h1 { font-size: 20px; font-weight: 800; color: #10b981; }
        .nav { display: flex; gap: 3px; margin-bottom: 18px; background: var(--surface);
            padding: 6px; border-radius: var(--radius); border: 1px solid var(--border); }
        .nav button { padding: 8px 14px; border: none; background: transparent; cursor: pointer;
            font-size: 12px; font-weight: 500; color: var(--text-3); border-radius: 8px;
            transition: all 0.18s; }
        .nav button.active { color: #fff; background: linear-gradient(135deg,var(--accent),var(--accent-2)); }
        .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
            align-items: center; background: var(--surface); padding: 12px 16px;
            border-radius: var(--radius); border: 1px solid var(--border); }
        .filter-btn { padding: 8px 12px; border: 1px solid var(--border); background: var(--surface-2);
            color: var(--text); cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 500; }
        .filter-btn.active { background: linear-gradient(135deg,var(--accent),var(--accent-2));
            color: #fff; border-color: var(--accent); }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px; margin-bottom: 20px; }
        .project-card { background: var(--surface); padding: 14px; border-radius: var(--radius);
            border: 1px solid var(--border); transition: all 0.2s; position: relative; }
        .project-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .project-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; cursor: pointer; }
        .project-card h3:hover { text-decoration: underline; }
        .project-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; }
        .project-actions button { padding: 6px 8px; border: none; background: var(--surface-2);
            color: var(--text-3); cursor: pointer; border-radius: 4px; font-size: 12px; transition: all 0.15s; }
        .project-actions button:hover { background: var(--danger); color: #fff; }
        .kanban { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        .kanban-column { background: var(--surface-2); border-radius: var(--radius); padding: 12px;
            min-height: 500px; border: 1px solid var(--border); }
        .kanban-column h3 { font-size: 11px; font-weight: 700; color: var(--text);
            margin-bottom: 10px; text-transform: uppercase; }
        .task-card { background: var(--surface); padding: 10px; border-radius: 6px;
            border-left: 3px solid var(--accent); margin-bottom: 8px; cursor: grab; }
        .task-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .task-meta { font-size: 9px; color: var(--text-3); }
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px;
            border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white; border: none; cursor: pointer; font-size: 24px; display: flex;
            align-items: center; justify-content: center; z-index: 100; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-box { background: var(--surface); padding: 24px; border-radius: var(--radius);
            width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 13px; }
        .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-save { background: var(--success); color: #fff; }
        .btn-delete { background: var(--danger); color: #fff; }
        .btn-cancel { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sync-status { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
        .sync-dot.connected { background: #10b981; animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @media (max-width: 768px) {
            .kanban { grid-template-columns: 1fr; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>VASSALLO Fábrica de Premoldeados de Hormigón</h1>
            <p>Gestor de Proyectos</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <a href="index.html" style="padding:10px 16px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;">📋 Tareas</a>
            <div class="sync-status">
                <div class="sync-dot" id="syncDot"></div>
                <span style="font-size:12px;color:#6b7280;" id="syncText">Conectando...</span>
            </div>
        </div>
    </header>

    <div class="nav" id="navTabs"></div>
    <div id="tab-proyectos" class="tab-content active">
        <div class="filters" id="filters"></div>
        <div class="projects-grid" id="projectsGrid"></div>
    </div>
    <div id="tab-reuniones" class="tab-content">
        <div class="filters" id="respButtons"></div>
        <div class="kanban" id="reunionesKanban"></div>
    </div>
    <div id="tab-proyecto-detail" class="tab-content">
        <button onclick="backToProjects()">📋 Proyectos</button>
        <div class="kanban" id="kanbanBoard"></div>
    </div>
</div>

<button class="fab" onclick="fabClick()">➕</button>

<div id="projectModal" class="modal">
    <div class="modal-box">
        <h2 id="modalTitle">Nuevo Proyecto</h2>
        <div class="form-group">
            <label>Tipo:</label>
            <select id="projectType">
                <option value="empresa">🏢 Empresa</option>
                <option value="personal">👤 Personal</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" id="projectName">
        </div>
        <div class="form-group">
            <label>Área:</label>
            <div style="display:flex;gap:8px;">
                <select id="projectArea" style="flex:1;">
                    <option value="">-- Nueva Área --</option>
                    <option value="Producción">Producción</option>
                    <option value="Ventas">Ventas</option>
                    <option value="Marketing">Marketing</option>
                </select>
            </div>
            <input type="text" id="projectAreaNew" placeholder="O escribe una nueva área" style="margin-top:8px;">
        </div>
        <div class="modal-btns">
            <button class="btn-save" onclick="saveProject()">Guardar</button>
            <button class="btn-delete" style="display:none;" id="deleteBtn" onclick="deleteProject()">Borrar</button>
            <button class="btn-cancel" onclick="closeProjectModal()">Cancelar</button>
        </div>
    </div>
</div>

<div id="taskModal" class="modal">
    <div class="modal-box">
        <h2>Nueva Tarea</h2>
        <div class="form-group">
            <label>Tarea:</label>
            <input type="text" id="taskTitle">
        </div>
        <div class="form-group">
            <label>Estado:</label>
            <select id="taskState">
                <option value="backlog">Backlog</option>
                <option value="planificado">Planificado</option>
                <option value="en-curso">En Curso</option>
                <option value="revision">Revisión</option>
                <option value="hecho">Hecho</option>
            </select>
        </div>
        <div class="modal-btns">
            <button class="btn-save" onclick="saveTask()">Guardar</button>
            <button class="btn-cancel" onclick="closeTaskModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    let db, dbRef;
    const STATES = ['backlog', 'planificado', 'en-curso', 'revision', 'hecho'];
    const STATE_LABELS = {backlog:'Backlog', planificado:'Planificado', 'en-curso':'En Curso', revision:'Revisión', hecho:'Hecho'};
    
    const initialData = {
        projects: [
            {id:'zxfo73z',name:'Auditoría de procesos',type:'empresa',area:'Producción',responsable:'Marcelo',tasks:[{id:'1z18o1d',title:'Detallar proceso',state:'en-curso',dueDate:''}]},
            {id:'jucfnyg',name:'Videos para redes',type:'empresa',area:'Marketing',responsable:'Sofia',tasks:[{id:'eeabu61',title:'Editar videos',state:'en-curso',dueDate:''}]},
        ]
    };

    let data = JSON.parse(localStorage.getItem('vph_pm_v1')) || initialData;
    let currentProjectId = null;
    let editingProjectId = null;
    let filterType = null;
    let filterArea = null;
    let filterResp = null;

    function setSyncStatus(state, text) {
        const syncDot = document.getElementById("syncDot");
        const syncText = document.getElementById("syncText");
        if (syncDot) syncDot.className = "sync-dot " + state;
        if (syncText) syncText.textContent = text;
    }

    const firebaseConfig = {
        apiKey: "AIzaSyC41xVzaA03K9WCLpX-5vL4QhN4Lb7rD6M",
        authDomain: "vpremoldeados-tareas.firebaseapp.com",
        databaseURL: "https://vpremoldeados-tareas-default-rtdb.firebaseio.com",
        projectId: "vpremoldeados-tareas",
    };

    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        dbRef = db.ref('proyectos');
    } catch(e) {
        console.warn('Firebase init:', e.message);
    }

    function saveData() {
        localStorage.setItem('vph_pm_v1', JSON.stringify(data));
        if (dbRef) dbRef.set(data).catch(err => console.warn('Firebase error:', err.message));
    }

    function render() {
        const tabs = ['Proyectos', 'Reuniones'];
        document.getElementById('navTabs').innerHTML = tabs.map((t, i) =>
            `<button class="nav-btn" onclick="switchTab('${i === 0 ? 'proyectos' : 'reuniones'}')">${t}</button>`
        ).join('');
        document.querySelectorAll('.nav-btn')[0].classList.add('active');
        
        renderProjects();
        renderFilters();
    }

    function renderProjects() {
        let filtered = data.projects;
        if (filterType) filtered = filtered.filter(p => p.type === filterType);
        if (filterArea) filtered = filtered.filter(p => p.area === filterArea);
        if (filterResp) filtered = filtered.filter(p => p.responsable === filterResp);

        document.getElementById('projectsGrid').innerHTML = filtered.map(p => `
            <div class="project-card">
                <div class="project-actions">
                    <button onclick="editProject('${p.id}')" title="Editar">✏️</button>
                    <button onclick="deleteProjectDirect('${p.id}')" title="Borrar">🗑️</button>
                </div>
                <h3 onclick="openProjectDetail('${p.id}')">${p.name}</h3>
                <div style="font-size:11px;color:var(--text-3);">${p.type === 'empresa' ? '🏢' : '👤'} ${p.area || ''} • ${p.responsable || ''}</div>
                <div style="font-size:11px;color:var(--text-3);">${p.tasks?.length || 0} tareas</div>
            </div>
        `).join('') || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-3);">Sin proyectos</div>';
    }

    function renderFilters() {
        const areas = [...new Set(data.projects.map(p => p.area).filter(Boolean))];
        const resps = [...new Set(data.projects.map(p => p.responsable).filter(Boolean))];

        let html = `<button class="filter-btn ${!filterType && !filterArea && !filterResp ? 'active' : ''}" onclick="filterType = null; filterArea = null; filterResp = null; render();">Todos</button>
                    <button class="filter-btn ${filterType === 'empresa' ? 'active' : ''}" onclick="filterType = 'empresa'; filterArea = null; filterResp = null; render();">🏢 Empresa</button>
                    <button class="filter-btn ${filterType === 'personal' ? 'active' : ''}" onclick="filterType = 'personal'; filterArea = null; filterResp = null; render();">👤 Personal</button>`;
        
        if (areas.length > 0) {
            areas.forEach(a => {
                html += `<button class="filter-btn ${filterArea === a ? 'active' : ''}" onclick="filterType = null; filterArea = '${a}'; filterResp = null; render();">${a}</button>`;
            });
        }

        if (resps.length > 0) {
            resps.forEach(r => {
                html += `<button class="filter-btn ${filterResp === r ? 'active' : ''}" onclick="filterType = null; filterArea = null; filterResp = '${r}'; render();">${r}</button>`;
            });
        }

        document.getElementById('filters').innerHTML = html;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        if (tab === 'proyectos') document.getElementById('tab-proyectos').classList.add('active');
        else if (tab === 'reuniones') renderReuniones();
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function renderReuniones() {
        document.getElementById('tab-reuniones').classList.add('active');
        const resps = ['Marcelo', 'Sofia', 'Gustavo'];
        document.getElementById('respButtons').innerHTML = resps.map(r =>
            `<button class="filter-btn" onclick="showReuniones('${r}')">${r}</button>`
        ).join('');
    }

    function showReuniones(resp) {
        const projects = data.projects.filter(p => p.responsable === resp);
        const html = STATES.map(state => {
            let tasks = [];
            projects.forEach(p => {
                if (p.tasks) tasks = tasks.concat(p.tasks.filter(t => t.state === state).map(t => ({...t, projectName: p.name})));
            });
            return `
                <div class="kanban-column">
                    <h3>${STATE_LABELS[state]} (${tasks.length})</h3>
                    <div>
                        ${tasks.map(t => `
                            <div class="task-card">
                                <div class="task-title">${t.title}</div>
                                <div class="task-meta">${t.projectName}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('reunionesKanban').innerHTML = html;
    }

    function fabClick() {
        editingProjectId = null;
        document.getElementById('modalTitle').textContent = 'Nuevo Proyecto';
        document.getElementById('projectType').value = 'empresa';
        document.getElementById('projectName').value = '';
        document.getElementById('projectArea').value = '';
        document.getElementById('projectAreaNew').value = '';
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('projectModal').classList.add('show');
    }

    function editProject(projectId) {
        event.stopPropagation();
        editingProjectId = projectId;
        const p = data.projects.find(x => x.id === projectId);
        document.getElementById('modalTitle').textContent = 'Editar Proyecto';
        document.getElementById('projectType').value = p.type || 'empresa';
        document.getElementById('projectName').value = p.name;
        document.getElementById('projectArea').value = p.area || '';
        document.getElementById('projectAreaNew').value = '';
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('projectModal').classList.add('show');
    }

    function deleteProjectDirect(projectId) {
        event.stopPropagation();
        if (confirm('¿Borrar proyecto y todas sus tareas?')) {
            data.projects = data.projects.filter(p => p.id !== projectId);
            saveData();
            render();
        }
    }

    function closeProjectModal() {
        document.getElementById('projectModal').classList.remove('show');
    }

    function saveProject() {
        const name = document.getElementById('projectName').value.trim();
        const type = document.getElementById('projectType').value;
        const areaSelect = document.getElementById('projectArea').value;
        const areaNew = document.getElementById('projectAreaNew').value.trim();
        const area = areaNew || areaSelect;

        if (!name) return alert('Ingresá nombre');
        if (!area) return alert('Selecciona o escribe una área');

        if (editingProjectId) {
            const p = data.projects.find(x => x.id === editingProjectId);
            p.name = name;
            p.type = type;
            p.area = area;
        } else {
            data.projects.push({
                id: 'p' + Date.now(),
                name,
                type,
                area,
                responsable: '',
                tasks: []
            });
        }
        saveData();
        render();
        closeProjectModal();
    }

    function deleteProject() {
        if (confirm('¿Borrar proyecto?')) {
            data.projects = data.projects.filter(p => p.id !== editingProjectId);
            saveData();
            render();
            closeProjectModal();
        }
    }

    function openProjectDetail(projectId) {
        currentProjectId = projectId;
        const p = data.projects.find(x => x.id === projectId);
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-proyecto-detail').classList.add('active');
        
        const html = STATES.map(state => {
            const tasks = (p.tasks || []).filter(t => t.state === state);
            return `
                <div class="kanban-column">
                    <h3>${STATE_LABELS[state]} (${tasks.length})</h3>
                    <div style="min-height:50px;">
                        ${tasks.map(t => `
                            <div class="task-card">
                                <div class="task-title">${t.title}</div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="filter-btn" onclick="document.getElementById('taskModal').classList.add('show');" style="width:100%; margin-top:8px;">+ Tarea</button>
                </div>
            `;
        }).join('');
        document.getElementById('kanbanBoard').innerHTML = html;
    }

    function closeTaskModal() {
        document.getElementById('taskModal').classList.remove('show');
    }

    function saveTask() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) return alert('Ingresá título');
        const p = data.projects.find(x => x.id === currentProjectId);
        p.tasks.push({
            id: 't' + Date.now(),
            title,
            state: document.getElementById('taskState').value,
            dueDate: ''
        });
        saveData();
        openProjectDetail(currentProjectId);
        closeTaskModal();
        document.getElementById('taskTitle').value = '';
    }

    function backToProjects() {
        currentProjectId = null;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-proyectos').classList.add('active');
    }

    function addTaskToMyDay(taskId, taskTitle, projectName) {
        let miDiaList = JSON.parse(localStorage.getItem("vph_mi_dia_v1")) || [];
        miDiaList.push({id: taskId, title: taskTitle, project: projectName, q: 1, addedFrom: "proyectos", date: new Date().toISOString()});
        localStorage.setItem("vph_mi_dia_v1", JSON.stringify(miDiaList));
        alert("✅ Agregada a Mi Día");
    }

    // Cargar desde Firebase
    if (dbRef) {
        const timeout = setTimeout(() => {
            setSyncStatus('connected', 'Conectado (local)');
            render();
        }, 8000);
        dbRef.once('value').then(snapshot => {
            clearTimeout(timeout);
            if (snapshot.exists()) {
                data = snapshot.val();
                localStorage.setItem('vph_pm_v1', JSON.stringify(data));
            }
            setSyncStatus('connected', 'Conectado');
            render();
        }).catch(err => {
            clearTimeout(timeout);
            setSyncStatus('connected', 'Conectado (local)');
            render();
        });
    } else {
        setSyncStatus('connected', 'Conectado (local)');
        render();
    }
</script>

</body>
</html>
