<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestor de Proyectos · Marcelo Vassallo</title>
<style>
html,body{margin:0;padding:0;background:#E7E3DA;font-family:Arial,sans-serif}
.vph{background:#E7E3DA;min-height:100vh;padding-bottom:60px}
.hd{background:#2D4A5C;color:#fff;padding:14px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hd h1{margin:0;font-size:18px;font-weight:700}
.nav{display:flex;gap:6px;padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:10}
.nav button{padding:8px 12px;border:1px solid #d1d5db;background:#fff;cursor:pointer;border-radius:4px;font-size:12px;font-weight:600}
.nav button.on{background:#2D4A5C;color:#fff;border-color:#2D4A5C}
.content{max-width:920px;margin:0 auto;padding:14px}
.status{text-align:center;padding:40px;color:#666;font-size:14px}
.btn{padding:10px 16px;background:#2D4A5C;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600}
.back{background:none;border:none;color:#2D4A5C;cursor:pointer;font-weight:600;padding:0;margin-bottom:12px;font-size:14px}
</style>
</head>
<body>
<div class="vph">
  <header class="hd">
    <h1>📊 Gestor de Proyectos</h1>
    <a href="index.html" style="margin-left:auto;background:#E0590C;color:#fff;text-decoration:none;padding:8px 12px;border-radius:4px;font-weight:600;font-size:12px;">← Tareas</a>
  </header>
  <div id="app"></div>
</div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState('inicio');
  const [projects, setProjects] = useState([]);

  useEffect(() => {
    const saved = localStorage.getItem('vph_pm_v1');
    if (saved) {
      try {
        setProjects(JSON.parse(saved));
      } catch (e) {
        console.log('Error cargando datos');
      }
    }
  }, []);

  const saveProjects = (p) => {
    setProjects(p);
    localStorage.setItem('vph_pm_v1', JSON.stringify(p));
  };

  return (
    <>
      <nav className="nav">
        <button onClick={() => setView('inicio')} className={view === 'inicio' ? 'on' : ''}>📋 Inicio</button>
        <button onClick={() => setView('proyectos')} className={view === 'proyectos' ? 'on' : ''}>📁 Proyectos</button>
        <button onClick={() => setView('reuniones')} className={view === 'reuniones' ? 'on' : ''}>👥 Reuniones</button>
      </nav>

      <div className="content">
        {view === 'inicio' && (
          <div className="status">
            <h2>👋 Bienvenido al Gestor de Proyectos</h2>
            <p>Seleccioná una vista arriba para empezar.</p>
            <p style={{fontSize: '12px', color: '#999'}}>Proyectos cargados: {projects.length}</p>
          </div>
        )}

        {view === 'proyectos' && (
          <div>
            <h2>Proyectos</h2>
            <p>Aquí irán tus proyectos ({projects.length})</p>
            <button className="btn" onClick={() => alert('Agregar proyecto - feature en desarrollo')}>+ Nuevo Proyecto</button>
          </div>
        )}

        {view === 'reuniones' && (
          <div>
            <h2>Reuniones</h2>
            <div style={{background: '#f3f4f6', padding: '14px', borderRadius: '4px', marginBottom: '14px'}}>
              <h3>👤 Gustavo</h3>
              <p>Lunes y Jueves, 11:00 hs (pausa de producción)</p>
            </div>
            <div style={{background: '#f3f4f6', padding: '14px', borderRadius: '4px'}}>
              <h3>👤 Sofía</h3>
              <p>Lunes y Jueves, 16:00 hs</p>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
